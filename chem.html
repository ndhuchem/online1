<main id="main-content" class="container">
    <div class="analyzer-wrapper" style="margin: 40px auto; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
        <h2 style="color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px;">🧪 化學分子結構分析系統(可能存在大量錯誤 謹慎使用)</h2>
        
        <label style="font-weight: bold; display: block; margin-top: 15px;">1. 輸入化學式 (格式：(原子符號)(數量))</label>
        <input type="text" id="formula" placeholder="例如：(C)(1)(O)(2)" style="width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 6px;">
        
        <button class="btn-generate" py-click="generate_ids" style="background: #34a853; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">1. 生成原子編號</button>
        
        <div id="id_hint" style="background: #fff3e0; padding: 10px; border-left: 5px solid #ff9800; margin: 10px 0; border-radius: 4px; font-family: monospace;">等待輸入化學式...</div>
        
        <label style="font-weight: bold; display: block; margin-top: 15px;">2. 輸入總電荷</label>
        <input type="number" id="charge" value="0" style="width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 6px;">
        
        <label style="font-weight: bold; display: block; margin-top: 15px;">3. 輸入連接關係</label>
        <textarea id="bonds" rows="4" placeholder="例如：0 1" style="width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 6px;"></textarea>
        
        <div class="button-group" style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-analyze" py-click="run_analysis" style="flex: 1; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">2. 開始分析結果</button>
            <button class="btn-reset" py-click="reset_all" style="flex: 1; padding: 12px; background: #ea4335; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">重設清除</button>
        </div>
        
        <div id="output" style="background: #202124; color: #e8eaed; padding: 20px; border-radius: 8px; white-space: pre-wrap; margin-top: 20px; font-family: monospace;">分析結果將顯示於此...</div>

        <div class="return-home" style="text-align: center; margin-top: 20px;">
            <a href="/online1/index.html" class="btn">返回首頁</a>
        </div>
    </div>

        def parse_formula(): # 化學式解析函數
            formula_str = document.querySelector("#formula").value #從HTML取得化學式字串
            nodes = []
            matches = re.findall(r"\(([A-Za-z]+)\)\((\d+)\)", formula_str) #使用表達式抓取括號內的內容 元素符號 數量
            for sym, count in matches:
                if sym in ELEMENT_DICT:
                    for _ in range(int(count)): #據數量將原子存入nodes列表 初始化該分子的剩餘價電子數 (rem_e)
                        nodes.append({"sym": sym, "rem_e": ELEMENT_DICT[sym]["ve"]})
            return nodes
        def generate_ids(event): #網頁交互函數：生成編號
            nodes = parse_formula() 
            hint_div = document.querySelector("#id_hint") #當使用者點擊『生成編號』時執行，顯示原子與對應索引
            if not nodes: #當不符合標準化學式時顯示警告訊息
                hint_div.innerText = "⚠ 格式不正確！請使用 (C)(1)(O)(2) 格式。"
                return
            hints = [f"[{i}]:{n['sym']}" for i, n in enumerate(nodes)] #生成原子標號字串並返回html
            hint_div.innerText = "原子編號： " + "  ".join(hints)
            document.querySelector("#bonds").placeholder = "若編號 0 與 1 有連接，請在此輸入：0 1"
        def run_analysis(event): # 核心運算函數：執行結構分析
            output_div = document.querySelector("#output")
            nodes = parse_formula()
            if not nodes:
                output_div.innerText = "錯誤：請先輸入化學式並點擊生成編號。"
                return
            charge = int(document.querySelector("#charge").value or 0) # 讀取電荷（影響中心原子電子數）與連接關係文字
            bonds_str = document.querySelector("#bonds").value
            total_atoms = len(nodes)
            adj = [[0] * total_atoms for _ in range(total_atoms)] # 初始化鄰接矩陣 (adj)，用來紀錄原子間的鍵數 (0=沒連, 1=單鍵, 2=雙鍵)
            for line in bonds_str.strip().split('\n'): #解析連接關係
                try:
                    parts = line.split()
                    if len(parts) == 2:
                        a, b = map(int, parts)
                        if a < total_atoms and b < total_atoms:
                            adj[a][b] = adj[b][a] = 1   
                except: continue
            #自動鍵結邏輯 
            if total_atoms > 0:
                nodes[0]["rem_e"] -= charge # 將電荷放入中心原子
            # 計算全單鍵
            for i in range(total_atoms):
                for j in range(i + 1, total_atoms):
                    if adj[i][j] >= 1:
                        nodes[i]["rem_e"] -= 1
                        nodes[j]["rem_e"] -= 1
            # 嘗試多鍵分配
            for i in range(total_atoms):
                while nodes[i]["rem_e"] > 0:
                    added = False
                    for j in range(total_atoms):
                        if adj[i][j] >= 1 and nodes[j]["rem_e"] > 0: #若兩者有相連且雙方都有剩餘電子，則增加鍵數
                            adj[i][j] += 1
                            adj[j][i] += 1
                            nodes[i]["rem_e"] -= 1
                            nodes[j]["rem_e"] -= 1
                            added = True
                            break
                    if not added: break
            res = f"{'編號':<6} {'原子':<6} {'總鍵數':<8} {'鍵級分配':<12} {'LP':<6} {'空間形狀':<12}\n"
            res += "="*60 + "\n"
            max_en, min_en, has_HB = -1.0, 10.0, False
            for i in range(total_atoms):
                sym = nodes[i]["sym"]
                e_data = ELEMENT_DICT[sym]
                # 統計電負度
                if e_data["en"] > max_en: max_en = e_data["en"]  #更新分子內最高與最低電負度
                if e_data["en"] > 0 and e_data["en"] < min_en: min_en = e_data["en"]
                b_sum, nbr, desc = 0, 0, ""
                for j in range(total_atoms):
                    if adj[i][j] > 0:
                        bond_order = adj[i][j]  #取得鍵級
                        b_sum += bond_order  #累加總鍵數
                        nbr += 1  #累加鄰居原子數 (即 VSEPR 中的 X)
                        desc += f"{bond_order}-"  #記錄分配情況如 "2-1-"
                        neighbor_sym = nodes[j]["sym"]
                        if sym == "H" and (neighbor_sym in ["F", "O", "N"]): #氫鍵判斷：若 H 原子連接在 F, O, N 上
                            has_HB = True
                lp = max(0, nodes[i]["rem_e"] // 2)  #計算LP,即VSEPR中的E 剩餘電子除以 2
                sn = nbr + lp
                sh = "末端"
                if sn == 4:
                    sh = "四面體" if lp == 0 else ("三角錐" if lp == 1 else "角形")
                elif sn == 3:
                    sh = "平面三角" if lp == 0 else "角形"
                elif sn == 2:
                    sh = "線性"
                res += f"{i:<8} {sym:<8} {b_sum:<10} {desc:<14} {lp:<8} {sh}\n"
            #作用力判斷邏輯
            de = max_en - min_en
            force_list = ["倫敦分散力"]
            if has_HB: force_list.insert(0, "氫鍵")
            if de > 0.5: force_list.insert(0, "偶極-偶極力")
            report = f"\n[分析報告]\n"
            report += f"極性強度 (ΔEN): {de:.2f}\n"
            report += f"主要作用力: {', '.join(force_list)}\n"
            output_div.innerText = res + report
        def reset_all(event):
            document.querySelector("#formula").value = ""
            document.querySelector("#charge").value = "0"
            document.querySelector("#bonds").value = ""
            document.querySelector("#id_hint").innerText = "等待輸入化學式..."
            document.querySelector("#output").innerText = "分析結果將顯示於此..."
    </script>
</main>
